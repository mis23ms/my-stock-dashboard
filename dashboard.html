<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股監控 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #F8F7F2;
  --navy: #004AAD;
  --navy-light: #1a5fc4;
  --text: #1a1a1a;
  --text-mid: #444;
  --text-light: #777;
  --border: #d4d0c4;
  --card-bg: #FFFFFF;
  --red: #C8102E;
  --red-bg: #fff0f2;
  --green: #006B3C;
  --green-bg: #f0fff6;
  --orange: #CC5500;
  --orange-bg: #fff5ee;
  --yellow-bg: #fffae8;
  --shadow: 0 2px 8px rgba(0,74,173,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
.header { background: var(--navy); color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
.header .meta { font-size: 12px; opacity: 0.75; }
.tabs { display: flex; background: white; border-bottom: 2px solid var(--border); overflow-x: auto; position: sticky; top: 52px; z-index: 90; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
.tab-btn { padding: 14px 22px; background: none; border: none; border-bottom: 3px solid transparent; font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text-mid); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.tab-btn:hover { color: var(--navy); background: rgba(0,74,173,0.04); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); font-weight: 700; }
.content { padding: 20px; max-width: 1100px; margin: 0 auto; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.section-title { font-size: 16px; font-weight: 700; color: var(--navy); border-left: 4px solid var(--navy); padding-left: 10px; margin: 24px 0 14px; }
.section-title:first-child { margin-top: 4px; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.dt-card { background: var(--card-bg); border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); border: 1px solid var(--border); position: relative; overflow: hidden; }
.dt-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
.dt-card.low::before { background: var(--green); }
.dt-card.mid::before { background: var(--orange); }
.dt-card.high::before { background: var(--red); }
.dt-card .stock-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-mid); margin-bottom: 2px; }
.dt-card .stock-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.dt-card .ratio-today { font-size: 26px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.dt-card.low .ratio-today { color: var(--green); }
.dt-card.mid .ratio-today { color: var(--orange); }
.dt-card.high .ratio-today { color: var(--red); }
.dt-card .ratio-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.dt-card .ratio-yesterday { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 13px; color: var(--text-mid); }
.dt-card .ratio-yesterday span { font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.badge.low { background: var(--green-bg); color: var(--green); }
.badge.mid { background: var(--orange-bg); color: var(--orange); }
.badge.high { background: var(--red-bg); color: var(--red); }
.data-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 24px; font-size: 13px; }
.data-table th { background: var(--navy); color: white; padding: 10px 12px; text-align: left; font-weight: 600; font-size: 13px; }
.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: rgba(0,74,173,0.03); }
.mono { font-family: 'JetBrains Mono', monospace; }
.red { color: var(--red); }
.green { color: var(--green); }
.orange { color: var(--orange); }
.conditions-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 24px; }
.condition-box { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; }
.condition-box-header { background: var(--navy); color: white; padding: 10px 14px; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
.condition-box-header .count { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 10px; font-size: 13px; }
.condition-box-body { padding: 12px; }
.condition-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { background: var(--yellow-bg); border: 1px solid #e8d98a; border-radius: 6px; padding: 4px 10px; font-size: 13px; display: flex; align-items: center; gap: 4px; }
.chip .chip-code { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 12px; color: var(--navy); }
.chip .chip-dev { font-size: 12px; }
.chip .chip-dev.neg { color: var(--red); }
.chart-container { background: var(--card-bg); border-radius: 10px; padding: 18px; box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 24px; }
.chart-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
.chart-wrap { position: relative; height: 260px; }
.signal-pill { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.signal-pill.bullish { background: var(--green-bg); color: var(--green); }
.signal-pill.bearish { background: var(--red-bg); color: var(--red); }
.signal-pill.neutral { background: #f0f0f0; color: var(--text-mid); }
/* ── POC + Close row ── */
.poc-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.poc-card { flex: 1; min-width: 140px; background: var(--navy); color: white; border-radius: 10px; padding: 14px 18px; box-shadow: var(--shadow); text-align: center; }
.poc-card.close-card { background: #1a1a2e; }
.poc-card.center-card { background: var(--navy-light); }
.poc-card .poc-label { font-size: 12px; opacity: 0.75; margin-bottom: 4px; }
.poc-card .poc-value { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; }
.poc-card .poc-sub { font-size: 11px; opacity: 0.7; margin-top: 4px; }
/* ── Price levels ── */
.price-levels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
.price-box { background: var(--card-bg); border-radius: 10px; padding: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.price-box-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.dot.red { background: var(--red); }
.dot.green { background: var(--green); }
.price-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
.price-row:last-child { border-bottom: none; }
.price-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; }
.price-val.red { color: var(--red); }
.price-val.green { color: var(--green); }
.price-vol { font-size: 12px; color: var(--text-light); }
@media(max-width:600px){
  .content { padding: 14px; }
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .price-levels-grid { grid-template-columns: 1fr; }
  .poc-row { flex-direction: column; }
  .tab-btn { padding: 12px 14px; font-size: 13px; }
}
.all-stocks-table td { padding: 7px 10px; font-size: 13px; }
.all-stocks-table th { padding: 9px 10px; }
</style>
</head>

<div class="content">

</div>

<!-- TAB 2 -->
<div id="tab-ma" class="tab-panel">

  <div class="section-title">固定 5 檔 均線一覽</div>
  <div style="overflow-x:auto">
  <table class="data-table">
    <thead><tr>
      <th>股票</th><th>收盤</th>
      <th>5日MA</th><th>5日乖離</th>
      <th>10日MA</th><th>10日乖離</th>
      <th>30日MA</th><th>30日乖離</th>
      <th>60日MA</th><th>60日乖離</th>
    </tr></thead>
    <tbody id="ma-table-body"></tbody>
  </table>
  </div>
  <div class="section-title">2330 台積電 — 5日乖離率趨勢</div>
  <div class="chart-container">
    <div class="chart-wrap"><canvas id="chart-deviation"></canvas></div>
  </div>
</div>

<!-- TAB 3 -->
<div id="tab-compare" class="tab-panel">
  <div class="section-title">圖A：2330 vs 0050 — 近 20 日累積報酬 (%)</div>
  <div class="chart-container">
    <div class="chart-wrap" style="height:280px"><canvas id="chart-a"></canvas></div>
  </div>
  <div class="section-title">圖B：2330 & TE vs TX — 近 20 日（雙 Y 軸）</div>
  <div class="chart-container">
    <div class="chart-title" style="color:var(--text-mid);font-size:13px;font-weight:400">左軸：2330 / TE（元）　右軸：TX（點）</div>
    <div class="chart-wrap" style="height:300px"><canvas id="chart-b"></canvas></div>
  </div>
</div>

<!-- TAB 4 -->
<div id="tab-txte" class="tab-panel">
  <div class="section-title">TX 臺股期貨</div>
  <div class="poc-row" id="tx-poc"></div>
  <div class="price-levels-grid" id="tx-levels"></div>
  <table class="data-table">
    <thead><tr><th>券商</th><th>買方均價</th><th>賣方均價</th><th>多空訊號</th></tr></thead>
    <tbody id="tx-broker-body"></tbody>
  </table>

  <div class="section-title">TE 電子期貨</div>
  <div class="poc-row" id="te-poc"></div>
  <div class="price-levels-grid" id="te-levels"></div>
  <table class="data-table">
    <thead><tr><th>券商</th><th>買方均價</th><th>賣方均價</th><th>多空訊號</th></tr></thead>
    <tbody id="te-broker-body"></tbody>
  </table>
</div>

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  btn.classList.add('active');
  if (id === 'compare' && !window._compareRendered) { renderCompare(); window._compareRendered=true; }
  if (id === 'ma' && !window._maRendered) { renderMAChart(); window._maRendered=true; }
}

function tier(r) {
  if (r===null||r===undefined) return 'mid';
  if (r<20) return 'low'; if (r<=45) return 'mid'; return 'high';
}
function tierLabel(r) {
  if (r===null) return '—';
  if (r<20) return '<20%'; if (r<=45) return '20~45%'; return '>45%';
}

// TAB 1
function renderDT() {
  const d = DATA.dt;
  document.getElementById('header-date').textContent = `資料日期：${d.today_date}`;
  const grid = document.getElementById('dt-cards');
  d.cards.forEach(c => {
    const t = tier(c.today);
    const div = document.createElement('div');
    div.className = `dt-card ${t}`;
    div.innerHTML = `<div class="stock-code">${c.code}</div><div class="stock-name">${c.name}</div>
      <div class="ratio-today mono">${c.today!==null?c.today+'%':'—'}</div>
      <div class="ratio-label">今日當沖率</div>
      <div class="ratio-yesterday">昨日：<span>${c.yesterday!==null?c.yesterday+'%':'—'}</span></div>`;
    grid.appendChild(div);
  });
  const tbody = document.getElementById('dt-all-body');
  d.all_stocks.forEach(s => {
    const t = tier(s.ratio);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="mono" style="color:var(--navy);font-weight:600">${s.code}</td>
      <td>${s.name}</td>
      <td class="mono" style="font-weight:700">${s.ratio}%</td>
      <td><span class="badge ${t}">${tierLabel(s.ratio)}</span></td>`;
    tbody.appendChild(tr);
  });
}

// TAB 2
function renderMA() {
  const d = DATA.ma;
  const labels = {'5日':'收盤 < 5日MA','10日':'收盤 < 10日MA','20日':'收盤 < 30日MA'};
  const container = document.getElementById('ma-conditions');
  ['5日','10日','20日'].forEach(k => {
    const items = d.conditions[k]||[];
    const box = document.createElement('div');
    box.className='condition-box';
    const chips = items.map(item=>{
      const dc=item.deviation<0?'neg':'';
      return `<div class="chip"><span class="chip-code">${item.code}</span>${item.name}<span class="chip-dev ${dc}">${item.deviation}%</span></div>`;
    }).join('');
    box.innerHTML=`<div class="condition-box-header">${labels[k]}<span class="count">${items.length}檔</span></div>
      <div class="condition-box-body"><div class="condition-chips">${chips||'<span style="color:var(--text-light);font-size:13px">無觸發</span>'}</div></div>`;
    container.appendChild(box);
  });
  const tbody = document.getElementById('ma-table-body');
  d.fixed5_ma.forEach(row=>{
    const r5=row['5日']||{}, r10=row['10日']||{}, r30=row['30日']||{}, r60=row['60日']||{};
    function devCell(obj){
      if(!obj||obj.deviation===undefined)return'<td>—</td>';
      const cls=obj.deviation<0?'red':'green';
      return`<td class="mono ${cls}" style="font-weight:600">${obj.deviation>0?'+':''}${obj.deviation}% ${obj.direction||''}</td>`;
    }
    function maCell(obj){
      if(!obj||!obj.ma)return'<td>—</td>';
      return`<td class="mono">${obj.ma}</td>`;
    }
    const close=r5.close||r10.close||'—';
    const belowAny=r5.deviation<0||r10.deviation<0||r30.deviation<0;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><span style="font-weight:700;color:var(--navy)">${row.code}</span> ${row.name}</td>
      <td class="mono" style="font-weight:700${belowAny?';color:var(--red)':''}">${close}</td>
      ${maCell(r5)}${devCell(r5)}${maCell(r10)}${devCell(r10)}${maCell(r30)}${devCell(r30)}${maCell(r60)}${devCell(r60)}`;
    tbody.appendChild(tr);
  });
}

        title:{display:true,text:'TX（點）',font:{size:12},color:'#C8102E'},
        ticks:{font:{size:11},color:'#C8102E'},
        grid:{drawOnChartArea:false}}
    }}
  });
}

// TAB 4
function renderTXTE() {
  [['tx',DATA.tx],['te',DATA.te]].forEach(([prefix,d])=>{
    // POC + close row
    const pocRow = document.getElementById(`${prefix}-poc`);
    pocRow.innerHTML=`
      <div class="poc-card close-card">
        <div class="poc-label">今日收盤</div>
        <div class="poc-value">${d.close_today!==undefined?d.close_today.toLocaleString():'—'}</div>
        <div class="poc-sub">${d.contract_name} ${d.trade_date}</div>
      </div>
      <div class="poc-card">
        <div class="poc-label">最大量價位 (POC)</div>
        <div class="poc-value">${d.poc.toLocaleString()}</div>
        <div class="poc-sub">成交量最集中</div>
      </div>
      <div class="poc-card center-card">
        <div class="poc-label">加權中心價</div>
        <div class="poc-value">${d.weighted_center.toLocaleString()}</div>
        <div class="poc-sub">全日量加權</div>
      </div>`;

    // Levels
    const levelsGrid = document.getElementById(`${prefix}-levels`);
    levelsGrid.innerHTML=`
      <div class="price-box">
        <div class="price-box-title"><span class="dot red"></span> 壓力區（前 3 大）</div>
        ${d.resistances.map((r,i)=>`
          <div class="price-row">
            <span><span style="color:var(--text-light);font-size:12px">R${i+1}</span>&nbsp;${r.zone}</span>
            <div style="text-align:right">
              <div class="price-val red">${r.mid_price.toLocaleString()}</div>
              <div class="price-vol">量 ${r.window_volume.toLocaleString()}</div>
            </div>
          </div>`).join('')}
      </div>
      <div class="price-box">
        <div class="price-box-title"><span class="dot green"></span> 支撐區（前 3 大）</div>
        ${d.supports.map((s,i)=>`
          <div class="price-row">
            <span><span style="color:var(--text-light);font-size:12px">S${i+1}</span>&nbsp;${s.zone}</span>
            <div style="text-align:right">
              <div class="price-val green">${s.mid_price.toLocaleString()}</div>
              <div class="price-vol">量 ${s.window_volume.toLocaleString()}</div>
            </div>
          </div>`).join('')}
      </div>`;

    // Broker table
    const tbody = document.getElementById(`${prefix}-broker-body`);
    tbody.innerHTML='';
    d.brokers.forEach(b=>{
      const sig = b.signal==='bullish'?'偏多 ▲':b.signal==='bearish'?'偏空 ▼':'中性';
      const tr=document.createElement('tr');
      tr.innerHTML=`<td style="font-weight:600">${b.canonical_broker}</td>
        <td class="mono">${b.buy_weighted_avg_price_proxy?b.buy_weighted_avg_price_proxy.toLocaleString():'—'}</td>
        <td class="mono">${b.sell_weighted_avg_price_proxy?b.sell_weighted_avg_price_proxy.toLocaleString():'—'}</td>
        <td><span class="signal-pill ${b.signal}">${sig}</span></td>`;
      tbody.appendChild(tr);
    });
  });
}

// INIT
renderDT();
renderMA();
renderTXTE();
</script>
</body>
</html>
